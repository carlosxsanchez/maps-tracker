<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAPS">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<title>MAPS Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --card: #1c1c1c;
  --card2: #222222;
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.15);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.15);
  --red: #e84040;
  --red-dim: rgba(232,64,64,0.15);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.12);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --border: rgba(255,255,255,0.07);
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* NAV */
.nav { display: flex; background: var(--bg2); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; font-size: 10px; font-family: var(--font-body); font-weight: 500; color: var(--text3); border: none; background: transparent; cursor: pointer; gap: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
.nav-btn.active { color: var(--green); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* HEADER */
.header { display: flex; align-items: flex-end; justify-content: space-between; padding: 16px 20px 14px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.header-left h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: 1px; color: var(--green); }
.header-left p { font-size: 12px; color: var(--text2); margin-top: 1px; }
.header-right { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; }
.btn { border: none; cursor: pointer; font-family: var(--font-body); font-weight: 600; border-radius: 10px; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--green); color: #000; padding: 12px 20px; font-size: 15px; width: 100%; }
.btn-sm { background: var(--bg3); color: var(--text); padding: 8px 14px; font-size: 13px; border: 1px solid var(--border); }
.btn-danger { background: var(--red-dim); color: var(--red); padding: 8px 14px; font-size: 13px; border: 1px solid rgba(232,64,64,0.2); }
.btn-icon { background: transparent; color: var(--text2); padding: 6px; border: none; display: flex; align-items: center; }
.btn-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* SCROLL */
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }
.scroll-notop { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 16px; }

/* CARDS */
.card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.card-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.card-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 10px; }

/* PILLS / BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }

/* PROGRAM SELECTOR */
.prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.prog-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.15s; }
.prog-card.selected { border-color: var(--green); background: var(--green-dim); }
.prog-card:active { opacity: 0.8; }
.prog-card-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.prog-card-sub { font-size: 11px; color: var(--text2); }

/* PHASE PROGRESS BAR */
.phase-bar-wrap { background: var(--bg3); border-radius: 6px; height: 8px; overflow: hidden; margin-top: 6px; }
.phase-bar { height: 100%; border-radius: 6px; background: var(--green); transition: width 0.5s ease; }

/* PHASE TIMELINE */
.phase-timeline { display: flex; gap: 0; margin-bottom: 16px; }
.phase-seg { flex: 1; height: 6px; background: var(--bg3); position: relative; }
.phase-seg:first-child { border-radius: 3px 0 0 3px; }
.phase-seg:last-child { border-radius: 0 3px 3px 0; }
.phase-seg.done { background: var(--green); }
.phase-seg.active { background: var(--amber); }
.phase-seg + .phase-seg { border-left: 2px solid var(--bg); }

/* CALENDAR GRID */
.cal-wrap { margin-bottom: 16px; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-month { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 600; color: var(--text3); padding-bottom: 6px; letter-spacing: 0.5px; }
.cal-cell { height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text3); background: var(--bg3); }
.cal-cell.worked { background: var(--green-dim); color: var(--green); font-weight: 700; }
.cal-cell.today { border: 2px solid var(--amber); color: var(--text); }
.cal-cell.today.worked { border-color: var(--green); }
.cal-cell.empty { background: transparent; }
.cal-legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* VIDEO PANEL */
.video-panel { background: var(--bg3); border-radius: 12px; margin: 10px 0; overflow: hidden; border: 1px solid var(--border); }
.video-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; }
.video-panel-title { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.video-panel-title svg { width: 16px; height: 16px; flex-shrink: 0; }
.video-panel-body { display: none; padding: 0 14px 14px; }
.video-panel-body.open { display: block; }
.video-embed { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; background: #000; }
.video-search-btn { display: flex; align-items: center; gap: 6px; margin-top: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text2); text-decoration: none; }
.video-search-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* PHASE SWITCHER ALERT */
.phase-alert { background: var(--blue-dim); border: 1px solid rgba(74,158,255,0.25); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 12px; align-items: flex-start; }
.phase-alert-icon { font-size: 20px; flex-shrink: 0; }
.phase-alert-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.phase-alert-text strong { color: var(--blue); font-weight: 700; }

/* WORKOUT BUILDER */
.exercise-row { background: var(--card2); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.exercise-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.sets-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.set-chip { flex-shrink: 0; background: var(--bg3); border-radius: 10px; padding: 8px 10px; min-width: 72px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
.set-chip.logged { background: var(--green-dim); border-color: var(--green); }
.set-chip-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.set-chip-val { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-top: 2px; }
.add-set-btn { flex-shrink: 0; background: var(--bg3); border: 1px dashed var(--border); border-radius: 10px; padding: 8px 10px; min-width: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); font-size: 20px; }

/* SET ENTRY MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%; max-height: 75vh; overflow-y: auto; border-top: 1px solid var(--border); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.input-row { display: flex; gap: 12px; margin-bottom: 16px; }
.input-group { flex: 1; }
.input-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.input-field { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-display); font-size: 24px; font-weight: 700; text-align: center; -webkit-appearance: none; }
.input-field:focus { outline: none; border-color: var(--green); }
.quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.quick-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; }
.quick-btn:active { background: var(--green-dim); color: var(--green); }

/* HISTORY */
.hist-item { background: var(--card); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; }
.hist-item:active { opacity: 0.8; }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.hist-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.hist-date { font-size: 12px; color: var(--text2); }
.hist-stats { display: flex; gap: 16px; }
.hist-stat { font-size: 12px; color: var(--text2); }
.hist-stat span { font-weight: 600; color: var(--text); }

/* BLUEPRINT */
.blueprint-ex { padding: 12px 0; border-bottom: 1px solid var(--border); }
.blueprint-ex:last-child { border-bottom: none; }
.blueprint-ex-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 3px; }
.blueprint-ex-detail { font-size: 12px; color: var(--text2); }
.superset-badge { background: var(--amber-dim); color: var(--amber); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; margin-left: 8px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); }
.stat-val { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--green); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 16px; }
.empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* PROGRAM OVERVIEW TABLE */
.phase-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.phase-table th { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.phase-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
.phase-table tr:last-child td { border-bottom: none; }
.phase-row.current td { background: rgba(245,166,35,0.05); }

::-webkit-scrollbar { display: none; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.screen.active .card { animation: fadeUp 0.2s ease both; }

/* REST TIMER */
#rest-timer-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-top: 1px solid var(--border);
  padding: 12px 16px 14px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 300; pointer-events: none;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
}
#rest-timer-bar.visible {
  transform: translateY(calc(-1 * (56px + var(--safe-bottom))));
  pointer-events: auto;
}
#rest-timer-inner { display: flex; align-items: center; gap: 14px; }
#rest-timer-label { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); min-width: 32px; }
#rest-timer-digits { font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--text); min-width: 68px; line-height: 1; transition: color 0.4s; }
#rest-timer-digits.urgent { color: var(--amber); }
#rest-timer-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
#rest-timer-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.9s linear, background 0.4s; }
#rest-timer-fill.urgent { background: var(--amber); }
#rest-timer-skip { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 12px; padding: 6px 14px; border-radius: 8px; font-family: var(--font-display); font-weight: 600; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap; }

/* EXERCISE IMAGE */
.exercise-img { width: 100%; display: block; max-height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <div class="header-left">
        <h1>MAPS</h1>
        <p id="home-program-label">Select a program to begin</p>
      </div>
      <div class="header-right" id="home-date"></div>
    </div>
    <div class="scroll">
      <div class="section-label">Program</div>
      <div class="prog-grid" id="prog-grid"></div>
      <div id="equipment-toggle-wrap" style="display:none;margin-bottom:4px">
        <div style="display:flex;gap:8px">
          <button id="btn-dumbbell" onclick="setEquipmentVersion('dumbbell')" class="btn" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid var(--green);background:var(--green-dim);color:var(--green)">🏠 Dumbbell</button>
          <button id="btn-gym" onclick="setEquipmentVersion('gym')" class="btn" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid var(--border);background:var(--bg3);color:var(--text2)">🏋️ Gym</button>
        </div>
      </div>
      <div id="active-program-panel" style="display:none">
        <div class="section-label">Current Phase</div>
        <div class="card" id="phase-status-card"></div>
        <div id="phase-alert-wrap"></div>
        <div class="section-label">Today's Workout</div>
        <div class="card" id="today-workout-card"></div>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="screen" id="screen-log">
    <div class="header">
      <div class="header-left">
        <h1 id="log-title">LOG</h1>
        <p id="log-subtitle">Start a workout</p>
      </div>
      <button class="btn btn-sm" id="log-action-btn" onclick="handleLogAction()">Select</button>
    </div>
    <div class="scroll" id="log-content"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="screen-progress">
    <div class="header">
      <div class="header-left">
        <h1>PROGRESS</h1>
        <p>Phase calendar and history</p>
      </div>
    </div>
    <div class="scroll" id="progress-content"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="screen-settings">
    <div class="header">
      <div class="header-left">
        <h1>SETTINGS</h1>
        <p>Data, import and export</p>
      </div>
    </div>
    <div class="scroll" id="settings-content"></div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchScreen('home')" id="nav-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="nav-btn" onclick="switchScreen('log')" id="nav-log">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Log
    </button>
    <button class="nav-btn" onclick="switchScreen('progress')" id="nav-progress">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
    <button class="nav-btn" onclick="switchScreen('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<!-- SET ENTRY MODAL -->
<div class="modal-overlay" id="set-modal" onclick="closeSetModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-ex-name"></div>
    <div class="modal-sub" id="modal-set-label"></div>
    <div class="input-row">
      <div class="input-group">
        <div class="input-label">Reps</div>
        <div class="quick-btns" id="quick-reps"></div>
        <input class="input-field" type="number" id="input-reps" placeholder="—" min="0">
      </div>
      <div class="input-group">
        <div class="input-label">Weight (lbs)</div>
        <div class="quick-btns" id="quick-weight"></div>
        <input class="input-field" type="number" id="input-weight" placeholder="BW" min="0">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveSet()" style="margin-top:4px">Save Set</button>
  </div>
</div>

<!-- REST TIMER BAR -->
<div id="rest-timer-bar">
  <div id="rest-timer-inner">
    <div id="rest-timer-label">Rest</div>
    <div id="rest-timer-digits">—</div>
    <div id="rest-timer-track"><div id="rest-timer-fill"></div></div>
    <button id="rest-timer-skip" onclick="skipRestTimer()">Skip</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// EXERCISE IMAGE HELPER — FIX: named function replaces broken IIFE
// ═══════════════════════════════════════════════════════
function _exImg(name) {
  var u = EXERCISE_IMAGES[(name || '').toLowerCase().trim()];
  if (!u) return '';
  return '<img class="exercise-img" src="' + u + '" alt="' + (name || '').replace(/"/g, "'") + '" loading="lazy" onerror="this.style.display=\'none\'">';
}

// STATE
// ═══════════════════════════════════════════════════════
let state = {
  selectedProgram: null,
  programStartDate: null,
  equipmentVersion: 'dumbbell',
  activeWorkout: null,
  workoutHistory: [],
  currentScreen: 'home'
};

let modalCtx = null;

const STORAGE_KEY = 'maps_state_v4';
const LEGACY_KEYS = ['maps_state_v3', 'maps_state_v2', 'maps_state_v1', 'maps_state'];

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { state = { ...state, ...JSON.parse(saved) }; return; }
    for (const key of LEGACY_KEYS) {
      const legacy = localStorage.getItem(key);
      if (legacy) { const parsed = JSON.parse(legacy); state = { ...state, ...parsed }; saveState(); return; }
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function exportData() {
  try {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'maps_backup_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  } catch(e) { showToast('Export failed'); }
}

function importFromFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => applyImport(e.target.result);
  reader.readAsText(file);
}

function importFromPaste() {
  const text = document.getElementById('import-paste').value.trim();
  if (!text) { showToast('Paste your JSON first'); return; }
  applyImport(text);
}

function applyImport(jsonText) {
  try {
    const parsed = JSON.parse(jsonText);
    if (typeof parsed !== 'object') throw new Error('Not a valid MAPS backup');
    const existingTs = new Set((state.workoutHistory || []).map(w => w.startTs));
    const incoming = (parsed.workoutHistory || []).filter(w => !existingTs.has(w.startTs));
    state.workoutHistory = [...(state.workoutHistory || []), ...incoming].sort((a, b) => (b.endTs || b.startTs) - (a.endTs || a.startTs));
    if (!state.selectedProgram && parsed.selectedProgram) state.selectedProgram = parsed.selectedProgram;
    if (!state.programStartDate && parsed.programStartDate) state.programStartDate = parsed.programStartDate;
    saveState();
    showToast('Imported ' + incoming.length + ' workout' + (incoming.length !== 1 ? 's' : ''));
    renderSettings(); renderProgress();
  } catch(e) { showToast('Import failed: ' + e.message); }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#222;color:#f0f0f0;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;border:1px solid rgba(255,255,255,0.1);pointer-events:none;opacity:0;transition:opacity 0.2s';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function scanAllKeys() {
  const found = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.toLowerCase().includes('maps')) {
      try { const val = JSON.parse(localStorage.getItem(key)); if (val && val.workoutHistory) found.push({ key, count: val.workoutHistory.length }); } catch(e) {}
    }
  }
  return found;
}

// PHASE CALCULATION
// ═══════════════════════════════════════════════════════
function countCompletedWorkouts(programId) {
  return (state.workoutHistory || []).filter(w => w.programId === programId).length;
}

function getCurrentPhaseInfo(programId) {
  const prog = PROGRAMS[programId]; if (!prog) return null;
  const completed = countCompletedWorkouts(programId);
  let cumWorkouts = 0, currentPhase = null, workoutsIntoPhase = 0;
  for (const ph of prog.phases) {
    if (completed < cumWorkouts + ph.workoutsRequired) { currentPhase = ph; workoutsIntoPhase = completed - cumWorkouts; break; }
    cumWorkouts += ph.workoutsRequired;
  }
  if (!currentPhase) { currentPhase = prog.phases[prog.phases.length - 1]; workoutsIntoPhase = currentPhase.workoutsRequired; }
  const workoutsRemaining = Math.max(0, currentPhase.workoutsRequired - workoutsIntoPhase);
  const pct = Math.min(100, Math.round((workoutsIntoPhase / currentPhase.workoutsRequired) * 100));
  const totalRequired = prog.phases.reduce((a, p) => a + p.workoutsRequired, 0);
  const overallPct = Math.min(100, Math.round((completed / totalRequired) * 100));
  return { currentPhase, workoutsIntoPhase, workoutsRemaining, pct, overallPct, completed, prog };
}

function getDays(phase) {
  const v = state.equipmentVersion || 'dumbbell';
  return (phase.days && phase.days[v]) ? phase.days[v] : (phase.days && phase.days.dumbbell) ? phase.days.dumbbell : phase.days || [];
}

function renderPhaseMiniBar(programId) {
  const info = getCurrentPhaseInfo(programId); if (!info) return '';
  const prog = PROGRAMS[programId];
  return '<div class="phase-bar-wrap" style="margin-top:8px"><div class="phase-bar" style="width:' + info.overallPct + '%;background:' + prog.color + '"></div></div>' +
    '<div style="font-size:10px;color:var(--text2);margin-top:4px">Phase ' + info.currentPhase.num + ' · ' + info.workoutsIntoPhase + '/' + info.currentPhase.workoutsRequired + ' workouts</div>';
}

function renderPhaseStatus() {
  const info = getCurrentPhaseInfo(state.selectedProgram); if (!info) return;
  const prog = PROGRAMS[state.selectedProgram];
  const { currentPhase, workoutsIntoPhase, workoutsRemaining, pct } = info;
  const segs = prog.phases.map(ph => '<div class="phase-seg ' + (ph.num < currentPhase.num ? 'done' : ph.num === currentPhase.num ? 'active' : '') + '"></div>').join('');
  document.getElementById('phase-status-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div class="card-label">Phase ${currentPhase.num} of ${prog.phases.length}</div>
        <div class="card-title">${currentPhase.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px">${currentPhase.objective}</div>
      </div>
      <div class="badge ${workoutsRemaining <= 3 ? 'badge-amber' : 'badge-green'}">${workoutsRemaining} left</div>
    </div>
    <div class="phase-timeline">${segs}</div>
    <div style="margin:8px 0 4px;font-size:12px;color:var(--text2)">${workoutsIntoPhase} of ${currentPhase.workoutsRequired} workouts completed</div>
    <div class="phase-bar-wrap"><div class="phase-bar" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap;margin-top:10px">
      <span>Intensity: <strong style="color:var(--text)">${currentPhase.intensity}</strong></span>
      <span>Rest: <strong style="color:var(--text)">${currentPhase.rest}</strong></span>
      <span>Tempo: <strong style="color:var(--text)">${currentPhase.tempo}</strong></span>
    </div>`;
}

function renderPhaseAlert() {
  const info = getCurrentPhaseInfo(state.selectedProgram);
  if (!info) { document.getElementById('phase-alert-wrap').innerHTML = ''; return; }
  const { workoutsRemaining, currentPhase, prog } = info;
  const nextPhase = prog.phases.find(p => p.num === currentPhase.num + 1);
  let html = '';
  if (nextPhase && workoutsRemaining <= 3) {
    html = '<div class="phase-alert"><div class="phase-alert-icon">🔄</div><div class="phase-alert-text"><strong>' + workoutsRemaining + ' workout' + (workoutsRemaining !== 1 ? 's' : '') + ' until Phase ' + nextPhase.num + '</strong><br>Up next: ' + nextPhase.name + ' — ' + nextPhase.objective + '.</div></div>';
  } else if (!nextPhase && workoutsRemaining === 0) {
    html = '<div class="phase-alert"><div class="phase-alert-icon">🏆</div><div class="phase-alert-text"><strong>Program complete!</strong><br>You have finished all phases.</div></div>';
  }
  document.getElementById('phase-alert-wrap').innerHTML = html;
}

function renderTodayCard() {
  const info = getCurrentPhaseInfo(state.selectedProgram); if (!info) return;
  const { currentPhase } = info;
  const dayOfWeek = new Date().getDay();
  const workoutDays = { 1: 0, 3: 1, 5: 2 };
  const dayIndex = workoutDays[dayOfWeek];
  const isMobility = [2, 4, 6].includes(dayOfWeek);
  let html = '';
  if (dayIndex !== undefined && getDays(currentPhase)[dayIndex]) {
    const day = getDays(currentPhase)[dayIndex];
    const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
    html = '<div style="margin-bottom:12px"><div class="card-label">Phase ' + currentPhase.num + ' · ' + currentPhase.name + '</div><div class="card-title">' + day.label + '</div><div style="font-size:12px;color:var(--text2);margin-top:3px">' + day.exercises.length + ' exercises · ' + totalSets + ' total sets</div></div>' +
      '<div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="startWorkout(\'' + state.selectedProgram + '\',' + currentPhase.num + ',' + dayIndex + ')">Start Workout</button>' +
      '<button class="btn btn-sm" onclick="viewBlueprint(\'' + state.selectedProgram + '\',' + currentPhase.num + ',' + dayIndex + ')">Blueprint</button></div>';
  } else if (isMobility) {
    html = '<div class="card-label">Active Recovery</div><div class="card-title">Mobility Session</div><div style="font-size:13px;color:var(--text2);margin-top:6px">Choose Mobility Session 1-4 from the program guide.</div>';
  } else {
    html = '<div style="text-align:center;padding:8px 0"><div style="font-size:24px;margin-bottom:8px">🟢</div><div style="font-size:14px;color:var(--text2)">Rest or mobility day. Recover well.</div></div>';
  }
  document.getElementById('today-workout-card').innerHTML = html;
}

function selectProgram(id) { state.selectedProgram = id; saveState(); renderHome(); }

// ═══════════════════════════════════════════════════════
// BLUEPRINT
// ═══════════════════════════════════════════════════════
function viewBlueprint(programId, phaseNum, dayIdx) {
  const prog = PROGRAMS[programId];
  const phase = prog.phases.find(p => p.num === phaseNum);
  const day = getDays(phase)[dayIdx];
  document.getElementById('log-content').innerHTML = `
    <div style="margin-bottom:16px">
      <button class="btn btn-sm" onclick="renderLog()" style="margin-bottom:12px">← Back</button>
      <div class="badge badge-green" style="margin-bottom:8px">${prog.shortName} · Phase ${phaseNum}</div>
      <div class="card-title" style="font-size:22px;margin-bottom:4px">${day.label}</div>
      <div style="font-size:12px;color:var(--text2)">Intensity ${phase.intensity} · ${phase.sets} · Rest ${phase.rest} · Tempo ${phase.tempo}</div>
    </div>
    <div class="card">
      ${day.exercises.map(ex => `
        <div class="blueprint-ex">
          <div class="blueprint-ex-name">${ex.name}${ex.superset ? '<span class="superset-badge">SUPERSET</span>' : ''}</div>
          <div class="blueprint-ex-detail">${ex.sets} sets × ${ex.reps}${ex.note ? ' · ' + ex.note : ''}</div>
        </div>`).join('')}
    </div>
    <button class="btn btn-primary" style="margin-top:4px" onclick="startWorkout('${programId}',${phaseNum},${dayIdx})">Start This Workout</button>`;
  document.getElementById('log-title').textContent = 'BLUEPRINT';
  document.getElementById('log-subtitle').textContent = day.label;
  document.getElementById('log-action-btn').style.display = 'none';
  switchScreen('log');
}

// ═══════════════════════════════════════════════════════
// LOG SCREEN
// ═══════════════════════════════════════════════════════
function renderLog() {
  document.getElementById('log-action-btn').style.display = '';
  if (state.activeWorkout) { renderActiveWorkout(); } else { renderWorkoutSelector(); }
}

function renderWorkoutSelector() {
  document.getElementById('log-title').textContent = 'LOG';
  document.getElementById('log-subtitle').textContent = 'Choose a workout';
  document.getElementById('log-action-btn').textContent = 'Quick Start';
  document.getElementById('log-action-btn').onclick = () => handleLogAction();
  const content = document.getElementById('log-content');
  if (!state.selectedProgram) {
    content.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><div class="empty-title">No Program Selected</div><div class="empty-sub">Go to Home and select a program to begin.</div></div>';
    return;
  }
  const prog = PROGRAMS[state.selectedProgram];
  const vLabel = (state.equipmentVersion || 'dumbbell') === 'dumbbell' ? '🏠 Dumbbell' : '🏋️ Gym';
  let html = '<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center"><div class="badge badge-green">' + prog.name + '</div><div class="badge ' + ((state.equipmentVersion||'dumbbell')==='dumbbell'?'badge-green':'badge-amber') + '">' + vLabel + '</div><button class="btn btn-sm" onclick="setEquipmentVersion(state.equipmentVersion===\'dumbbell\'?\'gym\':\'dumbbell\')" style="margin-left:auto;font-size:11px">Switch</button></div>';
  prog.phases.forEach(phase => {
    html += '<div class="section-label">Phase ' + phase.num + ' · ' + phase.name + '</div>';
    getDays(phase).forEach((day, i) => {
      html += '<div class="card" style="cursor:pointer" onclick="startWorkout(\'' + prog.id + '\',' + phase.num + ',' + i + ')">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div><div class="card-title" style="font-size:17px">' + day.label + '</div><div style="font-size:12px;color:var(--text2);margin-top:3px">' + day.exercises.length + ' exercises</div></div>' +
        '<div style="display:flex;gap:8px;align-items:center"><button class="btn btn-sm" onclick="event.stopPropagation();viewBlueprint(\'' + prog.id + '\',' + phase.num + ',' + i + ')">View</button>' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div></div>';
    });
  });
  content.innerHTML = html;
}

function handleLogAction() { if (state.activeWorkout) { finishWorkout(); } else { renderWorkoutSelector(); } }

function startWorkout(programId, phaseNum, dayIdx) {
  const prog = PROGRAMS[programId];
  const phase = prog.phases.find(p => p.num === phaseNum);
  const day = getDays(phase)[dayIdx];
  state.activeWorkout = {
    programId, phaseNum, dayIdx, label: day.label, startTs: Date.now(),
    exercises: day.exercises.map(ex => ({
      name: ex.name, targetSets: ex.sets, targetReps: ex.reps, note: ex.note || null, superset: ex.superset || false,
      sets: Array.from({ length: ex.sets }, () => ({ reps: '', weight: '', done: false }))
    }))
  };
  saveState(); renderActiveWorkout(); switchScreen('log');
}

function renderActiveWorkout() {
  const w = state.activeWorkout;
  const prog = PROGRAMS[w.programId];
  const elapsed = Math.floor((Date.now() - w.startTs) / 60000);
  const doneCount = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  const totalSets = w.exercises.reduce((a, ex) => a + ex.sets.length, 0);
  const pct = Math.round((doneCount / totalSets) * 100);

  document.getElementById('log-title').textContent = 'ACTIVE';
  document.getElementById('log-subtitle').textContent = elapsed + 'm elapsed · ' + doneCount + '/' + totalSets + ' sets';
  document.getElementById('log-action-btn').textContent = 'Finish';
  document.getElementById('log-action-btn').onclick = () => finishWorkout();

  let html = '<div class="card" style="margin-bottom:16px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
    '<div><div class="card-label">' + prog.shortName + ' · Phase ' + w.phaseNum + '</div>' +
    '<div class="card-title" style="font-size:17px">' + w.label + '</div></div>' +
    '<div class="badge ' + (pct === 100 ? 'badge-green' : 'badge-amber') + '">' + pct + '%</div></div>' +
    '<div class="phase-bar-wrap"><div class="phase-bar" style="width:' + pct + '%"></div></div></div>';

  w.exercises.forEach((ex, exIdx) => {
    const allDone = ex.sets.every(s => s.done);
    html += '<div class="exercise-row">' +
      '<div class="exercise-name"><span>' + ex.name + (ex.superset ? ' <span class="superset-badge">SS</span>' : '') + '</span>' +
      (allDone ? '<span style="color:var(--green);font-size:18px">✓</span>' : '') + '</div>' +
      (ex.note ? '<div style="font-size:11px;color:var(--amber);margin-bottom:8px">' + ex.note + '</div>' : '') +
      _exImg(ex.name) +
      '<div class="sets-row">' +
      ex.sets.map((s, si) => '<div class="set-chip ' + (s.done ? 'logged' : '') + '" onclick="openSetModal(' + exIdx + ',' + si + ')">' +
        '<div class="set-chip-label">Set ' + (si + 1) + '</div>' +
        '<div class="set-chip-val">' + (s.done ? (s.reps || '—') + (s.weight ? '<br><span style="font-size:11px;color:var(--text2)">' + s.weight + 'lb</span>' : '') : '+') + '</div></div>').join('') +
      '<div class="add-set-btn" onclick="addSet(' + exIdx + ')">+</div></div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:8px">Target: ' + ex.targetSets + ' × ' + ex.targetReps + '</div></div>';
  });

  html += '<button class="btn btn-primary" style="margin-top:8px" onclick="finishWorkout()">Complete Workout</button>' +
    '<div style="display:flex;gap:10px;margin-top:10px">' +
    '<button class="btn btn-danger" style="flex:1" onclick="cancelWorkout()">🗑 Cancel & Delete</button>' +
    '<button class="btn btn-sm" style="flex:1" onclick="saveWorkoutDraft()">💾 Save Draft</button></div>';

  document.getElementById('log-content').innerHTML = html;
}

function addSet(exIdx) { state.activeWorkout.exercises[exIdx].sets.push({ reps: '', weight: '', done: false }); saveState(); renderActiveWorkout(); }

function finishWorkout() {
  const w = state.activeWorkout;
  const doneCount = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  if (doneCount === 0 && !confirm('No sets logged. Finish anyway?')) return;
  state.workoutHistory.unshift({ ...w, endTs: Date.now(), duration: Date.now() - w.startTs });
  state.activeWorkout = null; saveState(); renderLog(); renderProgress();
}

function cancelWorkout() {
  if (confirm('Delete this workout? All logged sets will be lost.')) { state.activeWorkout = null; saveState(); renderLog(); }
}

function saveWorkoutDraft() { showToast('Draft saved — tap Log to resume'); saveState(); switchScreen('home'); }

// ═══════════════════════════════════════════════════════
// SET MODAL
// ═══════════════════════════════════════════════════════
function openSetModal(exIdx, setIdx) {
  modalCtx = { exIdx, setIdx };
  const ex = state.activeWorkout.exercises[exIdx];
  const set = ex.sets[setIdx];
  const prevSets = ex.sets.slice(0, setIdx).filter(s => s.done);
  document.getElementById('modal-ex-name').textContent = ex.name;
  document.getElementById('modal-set-label').textContent = 'Set ' + (setIdx + 1) + ' of ' + ex.sets.length + ' · Target: ' + ex.targetReps;
  document.getElementById('input-reps').value = set.reps || '';
  document.getElementById('input-weight').value = set.weight || '';
  const repMatch = String(ex.targetReps).match(/(\d+)/);
  const suggestReps = repMatch ? parseInt(repMatch[1]) : 10;
  const quickReps = [suggestReps - 2, suggestReps, suggestReps + 2].filter(r => r > 0);
  document.getElementById('quick-reps').innerHTML = quickReps.map(r => '<div class="quick-btn" onclick="document.getElementById(\'input-reps\').value=' + r + '">' + r + '</div>').join('');
  const weights = [...new Set(prevSets.map(s => s.weight).filter(Boolean))].slice(-3);
  document.getElementById('quick-weight').innerHTML = (weights.length ? weights : [25, 35, 45]).map(w => '<div class="quick-btn" onclick="document.getElementById(\'input-weight\').value=' + w + '">' + w + '</div>').join('');
  document.getElementById('set-modal').classList.add('open');
  setTimeout(() => document.getElementById('input-reps').focus(), 100);
}

function closeSetModal(e) { if (e.target === document.getElementById('set-modal')) document.getElementById('set-modal').classList.remove('open'); }

function saveSet() {
  const { exIdx, setIdx } = modalCtx;
  state.activeWorkout.exercises[exIdx].sets[setIdx] = { reps: document.getElementById('input-reps').value, weight: document.getElementById('input-weight').value, done: true };
  saveState(); document.getElementById('set-modal').classList.remove('open'); renderActiveWorkout();
  const prog = PROGRAMS[state.activeWorkout.programId];
  const phase = prog?.phases.find(p => p.num === state.activeWorkout.phaseNum);
  const secs = parseRestSeconds(phase?.rest || '');
  if (secs > 0) startRestTimer(secs);
}

// ═══════════════════════════════════════════════════════
// PROGRESS SCREEN
// ═══════════════════════════════════════════════════════
function renderProgress() {
  const el = document.getElementById('progress-content');
  let html = '';
  if (state.selectedProgram) {
    const prog = PROGRAMS[state.selectedProgram];
    const info = getCurrentPhaseInfo(state.selectedProgram);
    html += renderPhaseCalendar(prog, info);
    html += renderPhaseTable(prog, info);
  }
  if (state.workoutHistory.length) {
    const totalMin = Math.round(state.workoutHistory.reduce((a, w) => a + w.duration, 0) / 60000);
    const streak = calcStreak();
    const totalVol = state.workoutHistory.reduce((a, w) => a + w.exercises.reduce((b, ex) => b + ex.sets.filter(s => s.done && s.reps && s.weight).reduce((c, s) => c + parseInt(s.reps||0)*parseFloat(s.weight||0), 0), 0), 0);
    html += '<div class="section-label">Overall Stats</div><div class="stats-grid">' +
      '<div class="stat-card"><div class="stat-val">' + state.workoutHistory.length + '</div><div class="stat-label">Workouts</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + streak + '</div><div class="stat-label">Day Streak</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + totalMin + '</div><div class="stat-label">Total Minutes</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + Math.round(totalVol/1000) + 'k</div><div class="stat-label">Total Volume (lbs)</div></div></div>';
    html += '<div class="section-label">Workout History</div>';
    state.workoutHistory.slice(0, 20).forEach((w, i) => {
      const prog = PROGRAMS[w.programId] || {};
      const dur = Math.round(w.duration / 60000);
      const doneSets = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
      const date = new Date(w.endTs || w.startTs);
      html += '<div class="hist-item"><div class="hist-top">' +
        '<div style="flex:1;cursor:pointer" onclick="showHistDetail(' + i + ')">' +
        '<div class="badge badge-green" style="margin-bottom:6px;font-size:10px">' + (prog.shortName||'Workout') + ' · Ph ' + w.phaseNum + '</div>' +
        '<div class="hist-title">' + w.label + '</div></div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-left:12px">' +
        '<button onclick="deleteWorkout(' + i + ')" style="background:var(--red-dim);border:1px solid rgba(232,64,64,0.3);border-radius:8px;padding:7px 9px;cursor:pointer;display:flex;align-items:center">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e84040" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M9 6V4h6v2"/></svg></button>' +
        '<div style="text-align:right"><div class="hist-date">' + date.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '</div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:2px">' + date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) + '</div></div></div></div>' +
        '<div class="hist-stats" style="cursor:pointer" onclick="showHistDetail(' + i + ')">' +
        '<div class="hist-stat"><span>' + (dur < 1 ? '<1m' : dur + 'm') + '</span> duration</div>' +
        '<div class="hist-stat"><span>' + doneSets + '</span> sets</div>' +
        '<div class="hist-stat"><span>' + w.exercises.length + '</span> exercises</div></div></div>';
    });
  } else if (!state.selectedProgram) {
    html += '<div class="empty"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div class="empty-title">No Data Yet</div><div class="empty-sub">Select a program on the Home screen and log your first workout.</div></div>';
  }
  el.innerHTML = html;
}

function renderPhaseCalendar(prog, info) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth(), todayNum = now.getDate();
  const monthName = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const workedDays = new Set((state.workoutHistory || []).filter(w => w.programId === prog.id).map(w => { const d = new Date(w.endTs || w.startTs); if (d.getFullYear() === year && d.getMonth() === month) return d.getDate(); return null; }).filter(Boolean));
  return '<div class="section-label">Workout Calendar</div><div class="card cal-wrap">' +
    '<div class="cal-header"><div class="cal-month">' + monthName + '</div>' + (info ? '<div class="badge badge-amber">Phase ' + info.currentPhase.num + ': ' + info.currentPhase.name + '</div>' : '') + '</div>' +
    '<div class="cal-grid">' + ['S','M','T','W','T','F','S'].map(d => '<div class="cal-dow">' + d + '</div>').join('') +
    Array.from({ length: firstDow }, () => '<div class="cal-cell empty"></div>').join('') +
    Array.from({ length: daysInMonth }, (_, i) => { const d = i+1; const cls = 'cal-cell' + (workedDays.has(d)?' worked':'') + (d===todayNum?' today':''); return '<div class="' + cls + '">' + d + '</div>'; }).join('') + '</div>' +
    '<div class="cal-legend"><div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green-dim);border:1px solid var(--green)"></div>Workout done</div><div class="cal-legend-item"><div class="cal-legend-dot" style="border:2px solid var(--amber)"></div>Today</div></div></div>';
}

function renderPhaseTable(prog, info) {
  let html = '<div class="section-label">Phase Schedule</div><div class="card"><table class="phase-table"><thead><tr><th>Phase</th><th>Name</th><th>Workouts</th><th>Status</th></tr></thead><tbody>';
  prog.phases.forEach(ph => {
    const isCurrent = info && ph.num === info.currentPhase.num;
    const isDone = info && ph.num < info.currentPhase.num;
    const completedInPhase = isDone ? ph.workoutsRequired : (isCurrent ? info.workoutsIntoPhase : 0);
    const status = isDone ? 'Done' : isCurrent ? 'Active' : 'Upcoming';
    html += '<tr class="' + (isCurrent ? 'phase-row current' : '') + '"><td><strong>' + ph.num + '</strong></td>' +
      '<td>' + ph.name + '<br><span style="font-size:10px;color:var(--text3)">' + ph.objective + '</span></td>' +
      '<td style="font-size:12px">' + completedInPhase + '/' + ph.workoutsRequired + (isCurrent ? '<div class="phase-bar-wrap" style="margin-top:4px;height:4px"><div class="phase-bar" style="width:' + Math.round(completedInPhase/ph.workoutsRequired*100) + '%;height:4px"></div></div>' : '') + '</td>' +
      '<td><span class="badge ' + (isDone ? 'badge-green' : isCurrent ? 'badge-amber' : '') + '" style="font-size:10px">' + status + '</span></td></tr>';
  });
  return html + '</tbody></table></div>';
}

function showHistDetail(idx) {
  const w = state.workoutHistory[idx];
  const prog = PROGRAMS[w.programId] || {};
  const dur = Math.round(w.duration / 60000);
  const doneSets = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  const vol = w.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done && s.reps && s.weight).reduce((b, s) => b + parseInt(s.reps||0)*parseFloat(s.weight||0), 0), 0);
  const date = new Date(w.endTs || w.startTs);
  let html = '<button class="btn btn-sm" onclick="renderProgress()" style="margin-bottom:14px">← Back</button>' +
    '<div class="badge badge-green" style="margin-bottom:8px">' + (prog.shortName||'') + ' · Phase ' + w.phaseNum + '</div>' +
    '<div class="card-title" style="font-size:22px;margin-bottom:4px">' + w.label + '</div>' +
    '<div style="font-size:13px;color:var(--text2);margin-bottom:16px">' + date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) + '</div>' +
    '<div class="stats-grid" style="margin-bottom:16px"><div class="stat-card"><div class="stat-val">' + dur + 'm</div><div class="stat-label">Duration</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + doneSets + '</div><div class="stat-label">Sets Done</div></div>' +
    (vol > 0 ? '<div class="stat-card" style="grid-column:span 2"><div class="stat-val">' + Math.round(vol).toLocaleString() + '</div><div class="stat-label">Volume (lbs)</div></div>' : '') + '</div>' +
    '<div class="section-label">Exercise Log</div><div class="card">';
  w.exercises.forEach(ex => {
    const ds = ex.sets.filter(s => s.done);
    html += '<div class="blueprint-ex"><div class="blueprint-ex-name">' + ex.name + '</div>';
    if (ds.length) { html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'; ds.forEach((s,i) => { html += '<div style="background:var(--bg3);border-radius:8px;padding:6px 10px;font-size:12px"><strong>Set ' + (i+1) + '</strong>: ' + (s.reps||'—') + ' reps' + (s.weight ? ' @ ' + s.weight + ' lbs' : '') + '</div>'; }); html += '</div>'; }
    else { html += '<div style="font-size:12px;color:var(--text3);margin-top:4px">No sets logged</div>'; }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('progress-content').innerHTML = html;
}

function deleteWorkout(idx) {
  const w = state.workoutHistory[idx];
  if (!confirm('Delete "' + (w.label||'this workout') + '"? This cannot be undone.')) return;
  state.workoutHistory.splice(idx, 1); saveState(); showToast('Workout deleted'); renderProgress();
}

function calcStreak() {
  if (!state.workoutHistory.length) return 0;
  const days = [...new Set(state.workoutHistory.map(w => { const d = new Date(w.endTs || w.startTs); d.setHours(0,0,0,0); return d.getTime(); }))].sort((a,b) => b-a);
  let streak = 0, check = new Date(); check.setHours(0,0,0,0);
  for (const day of days) {
    if (day === check.getTime() || day === check.getTime() - 86400000) { streak++; check = new Date(day); check.setDate(check.getDate()-1); } else break;
  }
  return streak;
}

// ═══════════════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════════════
let _restInterval = null, _restTotal = 0;

function parseRestSeconds(restStr) {
  if (!restStr || /no rest|composure/i.test(restStr)) return 0;
  const minM = restStr.match(/([0-9.]+)\s*-?\s*([0-9.]+)?\s*min/i);
  if (minM) return Math.round(parseFloat(minM[1]) * 60);
  const secM = restStr.match(/([0-9]+)\s*-?\s*([0-9]+)?\s*sec/i);
  if (secM) { const lo = parseInt(secM[1]), hi = secM[2] ? parseInt(secM[2]) : lo; return Math.round((lo + hi) / 2); }
  return 0;
}

function _beep(freq, dur, delay, ctx) {
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.45, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
  osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + dur + 0.05);
}

function playRestDone() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); _beep(523,0.12,0,ctx); _beep(659,0.12,0.18,ctx); _beep(880,0.28,0.36,ctx); } catch(e) {} }
function playTick() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); _beep(440,0.06,0,ctx); } catch(e) {} }

function startRestTimer(seconds) {
  clearInterval(_restInterval); _restTotal = seconds;
  const bar = document.getElementById('rest-timer-bar');
  const digits = document.getElementById('rest-timer-digits');
  const fill = document.getElementById('rest-timer-fill');
  if (!bar) return;
  let remaining = seconds;
  function fmt(s) { const m = Math.floor(s/60), sec = s%60; return m > 0 ? m + ':' + String(sec).padStart(2,'0') : sec + 's'; }
  function update() { digits.textContent = fmt(remaining); fill.style.width = (remaining/_restTotal*100) + '%'; const urgent = remaining <= 5; digits.classList.toggle('urgent', urgent); fill.classList.toggle('urgent', urgent); }
  update(); bar.classList.add('visible');
  _restInterval = setInterval(() => {
    remaining--;
    if (remaining <= 3 && remaining > 0) playTick();
    if (remaining <= 0) {
      clearInterval(_restInterval); playRestDone();
      setTimeout(() => { bar.classList.remove('visible'); digits.textContent = '—'; fill.style.width = '100%'; digits.classList.remove('urgent'); fill.classList.remove('urgent'); }, 1200);
      return;
    }
    update();
  }, 1000);
}

function skipRestTimer() { clearInterval(_restInterval); const bar = document.getElementById('rest-timer-bar'); if (bar) bar.classList.remove('visible'); }
